<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
    font-family:'Poppins',sans-serif;
    background:#f8f9fa;
    color:#333;
    line-height:1.6;
}

/* ✅ VIDEO LATAR BELAKANG DARI YOUTUBE (SEMUA LINK KAMU SUDAH MASUK) */
.video-bg-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2; overflow: hidden;
}
.youtube-bg {
    position: absolute;
    top: 50%; left: 50%;
    width: 100vw; height: 56.25vw;
    min-height: 100vh; min-width: 177.77vh;
    transform: translate(-50%, -50%); border: none;
    display: none;
}
.youtube-bg.aktif {display:block;}
.lapisan-gelap {
    position: fixed; top:0;left:0;
    width:100%;height:100%;
    background:rgba(15, 32, 39, 0.65);
    z-index:-1;
}

/* ✅ TOMBOL MUSIK */
.audio-tombol {
    position: fixed; top:15px; left:15px;
    background:#28a745; color:white;
    padding:8px 15px; border-radius:8px;
    font-weight:600; z-index:999; cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* ✅ JAM DIGITAL */
#clock{
    position:fixed; top:15px; right:15px;
    background:rgba(255,255,255,0.9);
    padding:8px 12px; border-radius:8px;
    font-weight:bold; z-index:999;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

/* ✅ HEADER & TEKS BERJALAN */
.header-top{
    background:rgba(255,255,255,0.85);
    padding:15px 0;
    text-align:center;
    position:relative; z-index:2;
}
.logo{width:100px;margin-bottom:10px;}
.marquee-text{
    background:#28a745; color:white;
    padding:8px; font-weight:500;
    overflow:hidden; white-space:nowrap;
}
.teks-jalan{
    display:inline-block;
    animation: jalankan 20s linear infinite;
    padding-left:100%;
}
@keyframes jalankan {
    0% {transform:translateX(0%);}
    100% {transform:translateX(-100%);}
}

/* ✅ MENU UTAMA */
.menu-section{
    padding:30px 15px;
    position:relative; z-index:2;
}
.judul-utama{
    text-align:center; color:white;
    font-size:28px; margin-bottom:10px;
    text-shadow:0 2px 4px rgba(0,0,0,0.4);
}
.sub-judul{
    text-align:center; color:white;
    font-size:16px; margin-bottom:25px;
    opacity:0.9;
}
.area-iklan{
    max-width:900px; margin:15px auto;
    padding:10px; background:rgba(255,255,255,0.9);
    border-radius:10px; text-align:center;
}
.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px; max-width:900px; margin:0 auto;
}
.menu-card{
    color:white; text-decoration:none;
    padding:20px 10px; border-radius:12px;
    text-align:center; transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.hijau {background:linear-gradient(145deg, #28a745, #20c997);}
.biru {background:linear-gradient(145deg, #0d6efd, #3498db);}
.ungu {background:linear-gradient(145deg, #6f42c1, #9b59b6);}
.kuning {background:linear-gradient(145deg, #fd7e14, #f39c12);}
.merah {background:linear-gradient(145deg, #dc3545, #e74c3c);}
.hitam {background:linear-gradient(145deg, #212529, #343a40);}
.menu-card:hover{transform:translateY(-5px);}
.menu-icon{font-size:30px; margin-bottom:8px;}

/* ✅ KOTAK INFORMASI (PROFIL, GURU, PRESTASI - SESUAI GAMBAR KAMU) */
.info-wrapper{
    background:white; padding:40px 15px;
    position:relative; z-index:2;
}
.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px; max-width:1200px; margin:0 auto;
}
.info-card{
    background:white; border-radius:12px;
    padding:20px;
    box-shadow:0 3px 12px rgba(0,0,0,0.08);
    border-top:4px solid #28a745;
}
.info-card h3{
    display:flex; align-items:center; gap:8px;
    color:#28a745; margin-bottom:15px;
    font-size:18px;
}
.deskripsi-teks{font-size:14px; margin-bottom:15px;}
.btn-hijau{
    display:inline-block; background:#28a745;
    color:white; padding:8px 15px; border-radius:6px;
    text-decoration:none; font-weight:500; font-size:14px;
    transition:0.2s; border:none; cursor:pointer;
}
.btn-hijau:hover{background:#218838;}

/* ✅ TAMPILAN GURU */
.guru-item{
    display:flex; align-items:center; gap:12px;
    margin:12px 0; padding-bottom:12px;
    border-bottom:1px dashed #eee;
}
.guru-item img{
    width:60px; height:60px; border-radius:50%;
    object-fit:cover;
    border:2px solid #28a745;
}
.guru-nama{font-weight:600; font-size:14px;}
.guru-jabatan{font-size:12px; color:#666;}

/* ✅ TAMPILAN PRESTASI */
.prestasi-item{
    display:flex; align-items:center; gap:10px;
    margin:10px 0;
}
.prestasi-item i{color:#ffc107; font-size:20px; min-width:25px; text-align:center;}
.prestasi-teks{font-size:14px;}

/* ✅ PETA LOKASI */
.peta-box{border-radius:10px; overflow:hidden; height:200px; margin-top:10px;}

/* ✅ FOOTER */
footer{
    background:#28a745; color:white;
    padding:40px 15px 20px;
    position:relative; z-index:2;
}
.footer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px; max-width:1200px; margin:0 auto 20px;
}
footer h4{margin-bottom:15px; font-size:16px;}
footer ul{list-style:none;}
footer ul li{margin-bottom:8px; font-size:14px;}
footer a{color:white; text-decoration:none;}
footer a:hover{text-decoration:underline;}
.copy{text-align:center; padding-top:20px; border-top:1px solid rgba(255,255,255,0.2); font-size:13px;}

</style>
</head>
