*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Poppins',sans-serif;
    background:#f8f9fa;
    color:#333;
    line-height:1.6;
    position:relative;
}

/* =========================
   ✅ VIDEO LATAR BELAKANG
========================= */
.video-bg-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2; overflow: hidden;
}
.youtube-bg {
    position: absolute;
    top: 50%; left: 50%;
    width: 100vw; height: 56.25vw;
    min-height: 100vh; min-width: 177.77vh;
    transform: translate(-50%, -50%); border: none;
    display: none;
}
.youtube-bg.aktif {display:block;}
.lapisan-gelap {
    position: fixed; top:0;left:0;
    width:100%;height:100%;
    background:rgba(15, 32, 39, 0.65);
    z-index:-1;
}

/* =========================
   ✅ MUSIK
========================= */
.audio-tombol {
    position: fixed; top:15px; left:15px;
    background:#28a745; color:white;
    padding:8px 15px; border-radius:8px;
    font-weight:600; z-index:999; cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* =========================
   HEADER & NAVIGASI
========================= */
#clock{
    position:fixed; top:15px; right:15px;
    background:rgba(255,255,255,0.9);
    padding:8px 12px; border-radius:8px;
    font-weight:bold; z-index:999;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.header-top{
    background:rgba(255,255,255,0.9);
    padding:15px 0;
    text-align:center;
    position:relative;
    z-index:2;
}
.logo{width:100px;margin-bottom:10px;}
.marquee-text{
    background:#28a745; color:white;
    padding:8px; font-weight:500;
}

/* =========================
   KOTAK MENU UTAMA
========================= */
.menu-section{
    padding:30px 15px;
    position:relative; z-index:2;
}
.judul-utama{
    text-align:center; color:white;
    font-size:28px; margin-bottom:25px;
    text-shadow:0 2px 4px rgba(0,0,0,0.4);
}
.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px; max-width:900px; margin:0 auto;
}
.menu-card{
    background:linear-gradient(145deg, #28a745, #20c997);
    color:white; text-decoration:none;
    padding:20px 10px; border-radius:12px;
    text-align:center; transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.menu-card.merah{background:linear-gradient(145deg, #dc3545, #e74c3c);}
.menu-card.ungu{background:linear-gradient(145deg, #6f42c1, #9b59b6);}
.menu-card.kuning{background:linear-gradient(145deg, #fd7e14, #f39c12);}
.menu-card.biru{background:linear-gradient(145deg, #0d6efd, #3498db);}
.menu-card.hitam{background:linear-gradient(145deg, #212529, #343a40);}
.menu-card:hover{transform:translateY(-5px);}
.menu-icon{font-size:30px; margin-bottom:8px;}

/* =========================
   AREA IKLAN
========================= */
.iklan{
    max-width:900px; margin:20px auto;
    padding:12px; background:rgba(255,255,255,0.9);
    border-radius:10px; text-align:center;
    position:relative; z-index:2;
}

/* =========================
   KOTAK INFORMASI (PROFIL, GURU, PRESTASI, DLL)
========================= */
.info-wrapper{
    background:white; padding:40px 15px;
    position:relative; z-index:2;
}
.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px; max-width:1200px; margin:0 auto;
}
.info-card{
    background:white; border-radius:12px;
    padding:20px;
    box-shadow:0 3px 12px rgba(0,0,0,0.08);
    border-top:4px solid #28a745;
}
.info-card h3{
    display:flex; align-items:center; gap:8px;
    color:#28a745; margin-bottom:15px;
    font-size:18px;
}
.btn-hijau{
    display:inline-block; background:#28a745;
    color:white; padding:8px 15px; border-radius:6px;
    text-decoration:none; font-weight:500; margin-top:10px;
    transition:0.2s;
}
.btn-hijau:hover{background:#218838;}

/* ITEM GURU & PRESTASI */
.guru-item, .prestasi-item, .galeri-item{
    display:flex; align-items:center; gap:12px;
    margin:12px 0; padding-bottom:12px;
    border-bottom:1px dashed #eee;
}
.guru-item img, .galeri-item img{
    width:60px; height:60px; border-radius:50%;
    object-fit:cover;
}
.galeri-item img{border-radius:8px;}
.prestasi-item i{color:#ffc107; font-size:20px;}

/* PETA LOKASI */
.peta-box{border-radius:10px; overflow:hidden; height:200px;}

/* FOOTER */
footer{
    background:#28a745; color:white;
    padding:40px 15px 20px;
    position:relative; z-index:2;
}
.footer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px; max-width:1200px; margin:0 auto 20px;
}
footer h4{margin-bottom:15px;}
footer ul{list-style:none;}
footer ul li{margin-bottom:8px;}
footer a{color:white; text-decoration:none;}
footer a:hover{text-decoration:underline;}
.copy{text-align:center; padding-top:20px; border-top:1px solid rgba(255,255,255,0.2);}

/* RESPONSIF */
@media(max-width:768px){
    .judul-utama{font-size:22px;}
}
</style>
